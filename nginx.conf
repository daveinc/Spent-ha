server {
    listen 41234;
    server_name _;

    # Strip HA ingress path prefix before forwarding to Next.js.
    # INGRESS_PATH is injected into this file by run.sh at startup.
    set $ingress_path "INGRESS_PATH_PLACEHOLDER";

    location ~ ^INGRESS_PATH_PLACEHOLDER(/.*)?$ {
        proxy_pass http://127.0.0.1:3000$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Direct access (no ingress prefix)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
